[pytest]

minversion = 7.0

testpaths = tests

python_files = test_*.py
python_classes = Test*
python_functions = test_*

norecursedirs = .git venv env __pycache__ data reports logs .idea .vscode

markers =

    smoke: Критические тесты для быстрой проверки (запускать при каждом коммите)
    regression: Полный набор тестов (запускать ночью или перед релизом)
    
    positive: Позитивные сценарии (ожидаем успех)
    negative: Негативные сценарии (ожидаем ошибки)
    integration: Интеграционные тесты (ходят к реальному API)
    unit: Юнит-тесты (изолированные, без внешних вызовов)

    slow: Медленные тесты (API rate limits, большие объемы данных)
    fast: Быстрые тесты (по умолчанию)

    weather_current: Тесты текущей погоды
    weather_forecast: Тесты прогноза
    schema: Тесты валидации структуры данных

    flaky: Нестабильные тесты (требуют retry)
    wip: Work in Progress (разрабатываемые тесты)

addopts =
    -v
    --tb=short
    --strict-markers
    --strict-config   
    --disable-warnings
    --show-capture=no    

    --maxfail=3 
    --continue-on-collection-errors

    --durations=10 
    --durations-min=0.5  

    --ignore=temp
    --ignore=archive      

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(filename)s:%(lineno)d - %(message)s
log_cli_date_format = %H:%M:%S

log_file = logs/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)s] %(name)s - %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

filterwarnings =

    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    
    ignore:Using or importing the ABCs from 'collections':DeprecationWarning
    ignore:.*'urn' is deprecated.*:DeprecationWarning
    
    ignore:.*unclosed.*:ResourceWarning

env_files =
    .env
    .env.test

timeout = 300
timeout_method = thread

cache_dir = .pytest_cache

show_capture = False

console_output_encoding = utf-8
